<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CampSecond 校园二手集市</title>
    <style>
        /* 全部UI样式 组员B开发 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            color: #333;
        }
        /* 导航栏 */
        .nav-bar {
            height: 60px;
            background-color: #165dff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            color: white;
            box-shadow: 0 2px 8px #00000018;
        }
        .nav-title {
            font-size: 20px;
            font-weight: bold;
        }
        .nav-btn-group button {
            margin-left: 12px;
            padding: 7px 14px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        /* 搜索区域 */
        .search-box {
            margin: 20px 40px;
        }
        .search-box input,
        .search-box select,
        .search-box button {
            padding: 6px;
            margin-right: 8px;
        }
        /* 商品列表 */
        #goodsListBox {
            margin: 0 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 240px);
            gap: 16px;
        }
        .goods-item {
            background: #fff;
            padding: 12px;
            border-radius: 6px;
            box-shadow: 0 1px 4px #00000015;
        }
        /* 弹窗遮罩 */
        .mask {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal {
            width: 420px;
            background: #fff;
            padding: 24px;
            margin: 100px auto;
            border-radius: 8px;
        }
        .modal input,
        .modal textarea {
            width: 100%;
            margin: 6px 0 12px;
            padding: 6px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="nav-bar">
        <div class="nav-title">校园闲置二手集市</div>
        <div class="nav-btn-group">
            <button id="loginBtn">登录</button>
            <button id="publishingBtn">发布商品</button>
        </div>
    </div>

    <!-- 搜索筛选区域 -->
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入商品名称搜索">
        <select id="cateSelect">
            <option value="">全部分类</option>
            <option value="书本">书本</option>
            <option value="电器">电器</option>
            <option value="生活用品">生活用品</option>
        </select>
        <select id="sortSelect">
            <option value="">默认排序</option>
            <option value="priceAsc">价格升序</option>
            <option value="priceDesc">价格降序</option>
        </select>
        <button id="filterBtn">查询</button>
    </div>

    <!-- 商品展示容器 -->
    <div id="goodsListBox"></div>

    <!-- 弹窗遮罩层 -->
    <div class="mask" id="mask">
        <!-- 登录弹窗 -->
        <div class="modal" id="loginModal">
            <h3>用户登录</h3>
            用户名：<input type="text" placeholder="用户名" id="userName">
            <br>
            <button id="loginSubmit">登录</button>
            <button onclick="closeAllModal()">关闭</button>
        </div>
        <!-- 发布商品弹窗 -->
        <div class="modal" id="publishModal">
            <h3>发布闲置商品</h3>
            商品名称：<input id="goodsName"><br>
            原价：<input id="originPrice"><br>
            售价：<input id="sellPrice"><br>
            分类：<input id="cate"><br>
            描述：<textarea id="goodsDesc"></textarea><br>
            <button onclick="submitGoods()">提交发布</button>
            <button onclick="closeAllModal()">关闭</button>
        </div>
    </div>

    <!-- JS文件引入，必须放在body最后 -->
    <script src="goods.js"></script>
    <script src="user.js"></script>
    <script src="chat.js"></script>
    <script src="logic.js"></script>
</body>
</html>
